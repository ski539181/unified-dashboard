services:
  - type: web
    name: hermes-ai-os-backend
    runtime: node
    plan: free
    buildCommand: cd packages/server && npm install && npm run build
    startCommand: cd packages/server && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        sync: false